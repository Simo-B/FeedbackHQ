<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FeedbackHQ</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:white;border-radius:20px;padding:40px;max-width:380px;width:100%;text-align:center;border:1px solid #eee}
  .logo-sq{width:48px;height:48px;background:#E84545;border-radius:12px;margin:0 auto 20px}
  h1{font-size:22px;font-weight:700;margin-bottom:8px}
  p{font-size:14px;color:#888;margin-bottom:32px;line-height:1.5}
  .btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;text-decoration:none;margin-bottom:10px;transition:opacity .15s}
  .btn-primary{background:#E84545;color:white;border:none}
  .btn-secondary{background:white;color:#555;border:1.5px solid #ddd}
  .btn:hover{opacity:.9}
</style>
</head>
<body>
<div class="card">
  <div class="logo-sq"></div>
  <h1>FeedbackHQ</h1>
  <p>Plateforme de collecte d'avis clients pour les magasins BHV.</p>
  <a href="/admin" class="btn btn-primary">Interface admin</a>
  <a href="/r?m=rivoli" class="btn btn-secondary">Aperçu formulaire (Rivoli)</a>
</div>
</body>
</html>
